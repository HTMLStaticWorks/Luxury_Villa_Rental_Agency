<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 100 100">
  <defs>
    <linearGradient id="mainGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#0A9FA5;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#064E52;stop-opacity:1" />
    </linearGradient>
  </defs>
  <!-- Sophisticated Villa Outline -->
  <path d="M10,50 L50,15 L90,50" fill="none" stroke="url(#mainGrad)" stroke-width="8" stroke-linecap="round" stroke-linejoin="round"/>
  <!-- Diamond Peak -->
  <path d="M50,15 L62,35 L50,55 L38,35 Z" fill="#0A9FA5" />
  <!-- Pillars -->
  <path d="M25,50 L25,85 M75,50 L75,85" stroke="url(#mainGrad)" stroke-width="6" stroke-linecap="round"/>
  <!-- Base Line -->
