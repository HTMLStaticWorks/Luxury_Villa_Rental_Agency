<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="icon" type="image/svg+xml" href="images/favicon.svg">
    <title>Enter the Studio | Login</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.1/font/bootstrap-icons.css">
    <link rel="stylesheet" href="css/style.css">
</head>

<body class="auth-viewport-lock">

    <!-- MAIN AUTH CONTENT -->
    <div class="auth-wrap">
        <div class="auth-inner-wrap">
            <!-- THEME/RTL TOGGLES -->
            <div class="auth-nav-bar d-flex justify-content-end gap-2 mb-3">
                <button id="rtl-toggle" class="rtl-toggle-btn">
                    <span>RTL</span>
                </button>
                <button id="theme-toggle" class="theme-toggle-btn"><i class="bi bi-moon-fill"></i></button>
            </div>

            <div class="auth-card shadow-sm text-center reveal active">

                <a class="navbar-brand m-0 mb-4 d-flex align-items-center justify-content-center gap-2 mx-auto"
                    href="index.html">
                    <img src="images/logo-premium.svg" alt="LuxeVillas Logo" width="45" height="45">
                    <span class="brand-name">LuxeVillas</span>
                </a>

                <h2 class="h4 mb-1">Welcome <span class="text-gold">Back</span></h2>


                <form>
                    <div class="text-start mb-1">
                        <label class="form-label">Email</label>
                        <input type="email" class="form-control" placeholder="julianne@email.com">
                    </div>
                    <div class="text-start mb-2">
                        <label class="form-label">Password</label>
                        <input type="password" class="form-control" placeholder="..........">
                    </div>

                    <div class="d-flex justify-content-between align-items-center mb-3">
                        <div class="form-check d-flex align-items-center gap-2">
                            <input class="form-check-input" type="checkbox" id="rememberMe">
                            <label class="form-check-label opacity-75" for="rememberMe">Remember Me</label>
                        </div>
                        <a href="#" class="text-gold small">Forgot Password?</a>
                    </div>

                    <button type="submit" class="btn-artisanal w-100 mb-4">Login</button>

                    <div class="d-flex align-items-center mb-3">
                        <hr class="flex-grow-1 opacity-25">
                        <span class="mx-2 small opacity-50 text-uppercase ls-1">Or continue with</span>
                        <hr class="flex-grow-1 opacity-25">
                    </div>

                    <div class="social-auth-grid mb-4">
                        <button type="button" class="btn-social">
                            <i class="bi bi-google"></i> Google
                        </button>
                        <button type="button" class="btn-social">
                            <i class="bi bi-apple"></i> Apple
                        </button>
                        <button type="button" class="btn-social">
                            <i class="bi bi-facebook"></i> Facebook
                        </button>
                    </div>

                    <p class="small  mb-0 ">No account? <a href="register.html" class="text-gold fw-bold">Sign
                            Up</a></p>
                </form>
            </div><!-- end auth-card -->
        </div><!-- end auth-inner-wrap -->
    </div><!-- end auth-wrap -->

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
    <script src="js/main.js"></script>
</body>

</html>
