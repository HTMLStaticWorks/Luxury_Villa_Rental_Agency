<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="icon" type="image/svg+xml" href="images/favicon.svg">
    <title>Join the Studio | Register</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.1/font/bootstrap-icons.css">
    <link rel="stylesheet" href="css/style.css">
</head>

<body class="auth-viewport-lock">

    <!-- MAIN AUTH CONTENT -->
    <div class="auth-wrap">
        <div class="auth-card shadow-sm text-center reveal active">
            <!-- THEME/RTL TOGGLES (Inside Box) -->
            <div class="auth-nav d-flex justify-content-end gap-2 mb-2" style="margin-top: -20px; margin-right: -10px;">
                <button id="rtl-toggle" class="rtl-toggle-btn">
                    <span>RTL</span>
                </button>
                <button id="theme-toggle" class="theme-toggle-btn"><i class="bi bi-moon-fill"></i></button>
            </div>

            <a class="navbar-brand m-0 mb-3 d-block mx-auto" href="index.html">
                <img src="images/logo-premium.svg" alt="LuxeVillas" height="45" class="site-logo">
            </a>

            <h2 class="h4 mb-1">Join the <span class="text-gold">Studio</span></h2>


            <form>
                <div class="row text-start g-3">
                    <div class="col-6 mb-1">
                        <label class="form-label">First Name</label>
                        <input type="text" class="form-control" placeholder="Julianne">
                    </div>
                    <div class="col-6 mb-1">
                        <label class="form-label">Last Name</label>
                        <input type="text" class="form-control" placeholder="Smith">
                    </div>
                </div>
                <div class="text-start mb-1">
                    <label class="form-label">Email</label>
                    <input type="email" class="form-control" placeholder="julianne@email.com">
                </div>
                <div class="text-start mb-2">
                    <label class="form-label">Password</label>
                    <input type="password" class="form-control" placeholder="Create password">
                    <div class="form-check text-start mb-3">
                        <input class="form-check-input" type="checkbox" id="termsCheck" required>
                        <label class="form-check-label opacity-100" for="termsCheck" style="font-size:0.95rem;">I Agree
                            to <a href="#" class="text-gold fw-bold">Terms & Conditions</a></label>
                    </div>
                    <button type="submit" class="btn-artisanal w-100 mb-3">Create Account</button>

                    <div class="d-flex align-items-center mb-2">
                        <hr class="flex-grow-1 opacity-25">
                        <span class="mx-2 small opacity-50 text-uppercase ls-1" style="font-size: 0.55rem;">Or</span>
                        <hr class="flex-grow-1 opacity-25">
                    </div>

                    <div class="social-auth-grid mb-3">
                        <button type="button" class="btn-social">
                            <i class="bi bi-google"></i> Google
                        </button>
                        <button type="button" class="btn-social">
                            <i class="bi bi-facebook"></i> Facebook
                        </button>
                    </div>

                    <p class="small opacity-50 mb-0 text-center">Already an artist? <a href="login.html"
                            class="text-gold fw-bold">Log
                            In</a></p>
            </form>
        </div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
    <script src="js/main.js"></script>
</body>

</html>
